<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Smart IoT Monitoring</title>
    <style>
        /* สไตล์พื้นฐาน */
        body { 
            background: #0f172a; 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }

        /* กล่อง Login */
        .box { 
            background: #1e293b; 
            padding: 40px; 
            border-radius: 20px; 
            width: 350px; 
            text-align: center; 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            border: 1px solid #334155;
        }

        h2 { margin-bottom: 25px; color: #38bdf8; font-size: 1.8rem; }

        /* ช่อง Input */
        input { 
            width: 100%; 
            padding: 12px 15px; 
            margin: 10px 0; 
            border-radius: 10px; 
            border: 1px solid #334155; 
            background: #0f172a; 
            color: white; 
            box-sizing: border-box; 
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: #38bdf8; box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2); }

        /* ปุ่ม Login */
        button { 
            width: 100%; 
            padding: 12px; 
            background: #38bdf8; 
            border: none; 
            color: #0f172a; 
            cursor: pointer; 
            border-radius: 10px; 
            font-weight: bold; 
            font-size: 1rem;
            margin-top: 15px;
            transition: 0.3s;
        }

        button:hover { background: #0ea5e9; transform: translateY(-2px); }
        button:active { transform: translateY(0); }

        .links { margin-top: 20px; font-size: 0.9rem; }
        a { color: #94a3b8; text-decoration: none; transition: 0.3s; }
        a:hover { color: #38bdf8; }
    </style>
</head>
<body>

    <div class="box">
        <h2>🔐 เข้าสู่ระบบ</h2>
        <input type="text" id="userInput" placeholder="ชื่อผู้ใช้ (Username)">
        <input type="password" id="passInput" placeholder="รหัสผ่าน (Password)">
        
        <button onclick="doLogin()">Login</button>
        
        <div class="links">
            <span>ยังไม่มีบัญชี? </span>
            <a href="register.html">สมัครสมาชิก</a>
        </div>
    </div>

    <script>
        // ฟังก์ชัน Login
        async function doLogin() {
            const userVal = document.getElementById('userInput').value;
            const passVal = document.getElementById('passInput').value;

            if(!userVal || !passVal) return alert('กรุณากรอกข้อมูลให้ครบ');

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        username: userVal, 
                        password: passVal
                    })
                });

                const data = await res.json();

                if(data.status === 'ok') {
                    // --- หัวใจสำคัญของระบบ Admin ---
                    localStorage.setItem('role', data.role); // บันทึกสิทธิ์ (admin/user)
                    localStorage.setItem('user', data.user); // บันทึกชื่อ
                    
                    // ไปที่หน้า Dashboard
                    location.href = 'index.html';
                } else {
                    alert('ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง!');
                }
            } catch (err) {
                alert('ไม่สามารถเชื่อมต่อกับเซิร์ฟเวอร์ได้');
            }
        }

        // รองรับการกด Enter เพื่อ Login
        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                doLogin();
            }
        });
    </script>
</body>
</html>
